airgradient-proxy {
  http {
    host = "0.0.0.0"
    port = 8080
  }

  upstream {
    base-url = "http://airgradient_ecda3b1eaaaf.local"
    connect-timeout = 500ms
    request-timeout = 1s
  }

  polling {
    interval = 5s
    initial-fetch = true
    jitter = 250ms
    max-backoff = 60s
  }

  cache {
    fresh-ttl = 10s
    stale-ttl = 5m
    expired-after = 30m
    serve-expired = false
  }

  endpoints {
    config-get-mode = "cached"
    config-put-mode = "disabled"
  }

  logging {
    json = true
    level = "info"
  }
}
